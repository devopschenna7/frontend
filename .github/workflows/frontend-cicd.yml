name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-scan-deploy:
    runs-on: [self-hosted, linux]

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏗️ Setup Node Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🧪 Run Unit Tests
        # The watchAll=false flag ensures the test runner finishes and exits in CI
        run: npm test -- --watchAll=false 


      - name: 🐳 Build Docker Image
        run: docker build -t frontend-ecommerce:latest .

      - name: 🛡️ Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'frontend-ecommerce:latest'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: 🚢 Load Image into Kind
        run: kind load docker-image frontend-ecommerce:latest --name kind

      - name: ☸️ Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/
          kubectl rollout restart deployment frontend-deployment
