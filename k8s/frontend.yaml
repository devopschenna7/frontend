apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexshop-frontend
  template:
    metadata:
      labels:
        app: nexshop-frontend
    spec:
      containers:
      - name: frontend
        image: frontend-ecommerce:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort
  selector:
    app: nexshop-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30000 # This allows you to access it locally at localhost:30000
